services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\Plugins\ProofaSyncBundle\:
        resource: '../../*'
        exclude:
            - '../../DependencyInjection/'
            - '../../Message/'
            - '../../ProofaSyncBundle.php'

    Predis\ClientInterface:
        class: Predis\Client
        arguments:
            - '%env(REDIS_URL)%'
